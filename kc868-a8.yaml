# KinCony KC868-A8 — fertigation controller
# Board reference: https://devices.esphome.io/devices/kincony-kc868-a8/
#
# 8 relay outputs + 8 digital inputs via PCF8574 I2C expanders,
# S3/S4 onboard buttons, DS18B20 on 1-Wire.
# Relay 1: pump, relay 2: fertigation valve, relay 3: clean water valve.

esphome:
  name: kc868-a8

esp32:
  board: esp32dev  # required by ESPHome; the A8 v1.x uses an ESP32-WROOM-32
  variant: esp32

i2c:
  sda: 4
  scl: 5
  scan: true
  id: bus_a

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: kc868-a8
    password: !secret ap_password

captive_portal:

pcf8574:
  - id: "pcf8574_hub_out_1"
    address: 0x24
  - id: "pcf8574_hub_in_1"
    address: 0x22

switch:
  # After a power loss the pump and valves must come up OFF,
  # never restore a previous ON state.
  - platform: gpio
    name: "Pump"
    id: pump
    restore_mode: ALWAYS_OFF
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 0
      mode: OUTPUT
      inverted: true
  - platform: gpio
    name: "Fertigation Valve"
    id: fertigation_valve
    restore_mode: ALWAYS_OFF
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 1
      mode: OUTPUT
      inverted: true
  - platform: gpio
    name: "Clean Water Valve"
    id: clean_water_valve
    restore_mode: ALWAYS_OFF
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 2
      mode: OUTPUT
      inverted: true
  - platform: gpio
    name: "Relay 4"
    id: relay_4
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 3
      mode: OUTPUT
      inverted: true
  - platform: gpio
    name: "Relay 5"
    id: relay_5
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 4
      mode: OUTPUT
      inverted: true
  - platform: gpio
    name: "Relay 6"
    id: relay_6
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 5
      mode: OUTPUT
      inverted: true
  - platform: gpio
    name: "Relay 7"
    id: relay_7
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 6
      mode: OUTPUT
      inverted: true
  - platform: gpio
    name: "Relay 8"
    id: relay_8
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 7
      mode: OUTPUT
      inverted: true

binary_sensor:
  - platform: gpio
    name: "a8-input1"
    pin:
      pcf8574: pcf8574_hub_in_1
      number: 0
      mode: INPUT
      inverted: true
  - platform: gpio
    name: "a8-input2"
    pin:
      pcf8574: pcf8574_hub_in_1
      number: 1
      mode: INPUT
      inverted: true
  - platform: gpio
    name: "a8-input3"
    pin:
      pcf8574: pcf8574_hub_in_1
      number: 2
      mode: INPUT
      inverted: true
  - platform: gpio
    name: "a8-input4"
    pin:
      pcf8574: pcf8574_hub_in_1
      number: 3
      mode: INPUT
      inverted: true
  - platform: gpio
    name: "a8-input5"
    pin:
      pcf8574: pcf8574_hub_in_1
      number: 4
      mode: INPUT
      inverted: true
  - platform: gpio
    name: "a8-input6"
    pin:
      pcf8574: pcf8574_hub_in_1
      number: 5
      mode: INPUT
      inverted: true
  - platform: gpio
    name: "a8-input7"
    pin:
      pcf8574: pcf8574_hub_in_1
      number: 6
      mode: INPUT
      inverted: true
  - platform: gpio
    name: "a8-input8"
    pin:
      pcf8574: pcf8574_hub_in_1
      number: 7
      mode: INPUT
      inverted: true
  - platform: gpio
    name: "a8-s3"
    pin:
      number: 32
      inverted: true
  - platform: gpio
    name: "a8-s4"
    pin:
      number: 33
      inverted: true

one_wire:
  - platform: gpio
    pin: GPIO14

sensor:
  - platform: dallas_temp
    # Replace with your own sensor's address — it is printed in the
    # ESPHome logs on boot when a DS18B20 is connected to GPIO14.
    address: 0x1c0000031edd2a28
    name: "ds18b20-1"

logger:

api:

ota:
  - platform: esphome
    id: my_ota
    password: !secret ota_password

mqtt:
  broker: !secret mqtt_broker_ip
  username: !secret mqtt_broker_username
  password: !secret mqtt_broker_password
  client_id: kc868-a8
  reboot_timeout: 0s
