# KinCony KC868-A8 — fertigation controller
# Board reference: https://devices.esphome.io/devices/kincony-kc868-a8/
#
# 8 relay outputs + 8 digital inputs via PCF8574 I2C expanders,
# S3/S4 onboard buttons, DS18B20 on 1-Wire.
# Relay 1: pump, relay 2: fertigation valve, relay 3: clean water valve.

esphome:
  name: kc868-a8
  friendly_name: Automated Fertigation System

esp32:
  board: esp32dev  # required by ESPHome; the A8 v1.x uses an ESP32-WROOM-32
  variant: esp32
  # ESP-IDF, not Arduino: with the Arduino framework the BT controller's
  # DRAM reservation overlaps another region and the boot asserts in
  # s_prepare_reserved_regions (hard boot loop, no safe mode). IDF is
  # also the future ESPHome default and builds a smaller binary.
  framework:
    type: esp-idf

# Pinned: audited/trusted code cannot change silently under a moving branch.
external_components:
  - source: github://Fabian-Schmidt/esphome-victron_ble@2024-12-27

# Victron SmartShunt battery monitor, read over BLE instant readout —
# passive listening, no pairing, no wiring to the board. MAC and AES
# key come from VictronConnect (Product info > Instant readout details).
esp32_ble_tracker:

victron_ble:
  - id: smartshunt
    mac_address: !secret smartshunt_mac
    bindkey: !secret smartshunt_bindkey

i2c:
  sda: 4
  scl: 5
  scan: true
  id: bus_a

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: kc868-a8
    password: !secret ap_password

captive_portal:

web_server:
  port: 80
  version: 3
  include_internal: true
  auth:
    username: !secret web_server_user
    password: !secret web_server_password
  local: true

pcf8574:
  - id: "pcf8574_hub_out_1"
    address: 0x24
  - id: "pcf8574_hub_in_1"
    address: 0x22

switch:
  # After a power loss the pump and valves must come up OFF,
  # never restore a previous ON state.
  - platform: gpio
    name: "Pump"
    id: pump
    restore_mode: ALWAYS_OFF
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 0
      mode: OUTPUT
      inverted: true
  - platform: gpio
    name: "Fertigation Valve"
    id: fertigation_valve
    restore_mode: ALWAYS_OFF
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 1
      mode: OUTPUT
      inverted: true
  - platform: gpio
    name: "Clean Water Valve"
    id: clean_water_valve
    restore_mode: ALWAYS_OFF
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 2
      mode: OUTPUT
      inverted: true
  - platform: gpio
    name: "Relay 4"
    id: relay_4
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 3
      mode: OUTPUT
      inverted: true
  - platform: gpio
    name: "Relay 5"
    id: relay_5
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 4
      mode: OUTPUT
      inverted: true
  - platform: gpio
    name: "Relay 6"
    id: relay_6
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 5
      mode: OUTPUT
      inverted: true
  - platform: gpio
    name: "Relay 7"
    id: relay_7
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 6
      mode: OUTPUT
      inverted: true
  - platform: gpio
    name: "Relay 8"
    id: relay_8
    pin:
      pcf8574: pcf8574_hub_out_1
      number: 7
      mode: OUTPUT
      inverted: true

# Phase durations, adjustable at runtime from the web UI, HA, or MQTT.
number:
  - platform: template
    name: "Pre-wet Minutes"
    id: prewet_minutes
    min_value: 0
    max_value: 60
    step: 1
    initial_value: 5
    optimistic: true
    restore_value: true
    unit_of_measurement: min
    mode: box
  - platform: template
    name: "Fertigation Minutes"
    id: fertigation_minutes
    min_value: 0
    max_value: 120
    step: 1
    initial_value: 20
    optimistic: true
    restore_value: true
    unit_of_measurement: min
    mode: box
  # Minimum 1: the flush is what guarantees no residues, so it cannot
  # be zeroed.
  - platform: template
    name: "Flush Minutes"
    id: flush_minutes
    min_value: 1
    max_value: 60
    step: 1
    initial_value: 5
    optimistic: true
    restore_value: true
    unit_of_measurement: min
    mode: box

script:
  # Valve handovers overlap 2s so the running pump always has an open
  # source; the pump's 3.8 bar pressure switch is only the backstop.
  - id: irrigation_sequence
    mode: single
    then:
      # Phase 1: pre-wet with clean water — prime lines, moisten soil
      - switch.turn_on: clean_water_valve
      - delay: 2s
      - switch.turn_on: pump
      - delay: !lambda "return (uint32_t)(id(prewet_minutes).state * 60000);"
      # Phase 2: fertigation
      - switch.turn_on: fertigation_valve
      - delay: 2s
      - switch.turn_off: clean_water_valve
      - delay: !lambda "return (uint32_t)(id(fertigation_minutes).state * 60000);"
      # Phase 3: flush with clean water so no residues remain
      - switch.turn_on: clean_water_valve
      - delay: 2s
      - switch.turn_off: fertigation_valve
      - delay: !lambda "return (uint32_t)(id(flush_minutes).state * 60000);"
      # Shutdown
      - switch.turn_off: pump
      - delay: 2s
      - switch.turn_off: clean_water_valve

  # Single shared interrupt path: the stop button, the MQTT stop topic,
  # and any future sensor (tank float switch, pump current) all execute
  # this. Pump goes off first so it never runs against closed valves.
  - id: abort_irrigation
    mode: single
    then:
      - script.stop: irrigation_sequence
      - switch.turn_off: pump
      - delay: 2s
      - switch.turn_off: fertigation_valve
      - switch.turn_off: clean_water_valve

button:
  - platform: template
    name: "Start Irrigation"
    id: start_irrigation
    on_press:
      - script.execute: irrigation_sequence
  - platform: template
    name: "Stop Irrigation"
    id: stop_irrigation
    on_press:
      - script.execute: abort_irrigation

binary_sensor:
  - platform: template
    name: "Irrigation Running"
    lambda: "return id(irrigation_sequence).is_running();"
  # Mirrors the SmartShunt's own charged detection (charged voltage
  # 14.0V, tail current 4% of 8Ah, 3 min): ON when the charge cycle
  # completes, OFF again once the MPPT drops to float.
  - platform: template
    name: "Battery Charged"
    id: battery_charged
    filters:
      - delayed_on: 180s
    lambda: |-
      if (isnan(id(batt_voltage).state) || isnan(id(batt_current).state))
        return {};
      return id(batt_voltage).state >= 14.0 &&
             fabs(id(batt_current).state) <= 0.32;
    on_press:
      - mqtt.publish:
          topic: kc868-a8/battery/charged
          payload: "ON"
  - platform: gpio
    name: "a8-input1"
    pin:
      pcf8574: pcf8574_hub_in_1
      number: 0
      mode: INPUT
      inverted: true
  - platform: gpio
    name: "a8-input2"
    pin:
      pcf8574: pcf8574_hub_in_1
      number: 1
      mode: INPUT
      inverted: true
  - platform: gpio
    name: "a8-input3"
    pin:
      pcf8574: pcf8574_hub_in_1
      number: 2
      mode: INPUT
      inverted: true
  - platform: gpio
    name: "a8-input4"
    pin:
      pcf8574: pcf8574_hub_in_1
      number: 3
      mode: INPUT
      inverted: true
  - platform: gpio
    name: "a8-input5"
    pin:
      pcf8574: pcf8574_hub_in_1
      number: 4
      mode: INPUT
      inverted: true
  - platform: gpio
    name: "a8-input6"
    pin:
      pcf8574: pcf8574_hub_in_1
      number: 5
      mode: INPUT
      inverted: true
  - platform: gpio
    name: "a8-input7"
    pin:
      pcf8574: pcf8574_hub_in_1
      number: 6
      mode: INPUT
      inverted: true
  - platform: gpio
    name: "a8-input8"
    pin:
      pcf8574: pcf8574_hub_in_1
      number: 7
      mode: INPUT
      inverted: true
  - platform: gpio
    name: "a8-s3"
    pin:
      number: 32
      inverted: true
  - platform: gpio
    name: "a8-s4"
    pin:
      number: 33
      inverted: true

one_wire:
  - platform: gpio
    pin: GPIO14

sensor:
  # The shunt broadcasts ~1/s; throttle publishing to every 5s.
  - platform: victron_ble
    victron_ble_id: smartshunt
    name: "Battery Voltage"
    id: batt_voltage
    type: BATTERY_VOLTAGE
    filters:
      - throttle_average: 5s
  - platform: victron_ble
    victron_ble_id: smartshunt
    name: "Battery Current"
    id: batt_current
    type: BATTERY_CURRENT
    filters:
      - throttle_average: 5s
  - platform: victron_ble
    victron_ble_id: smartshunt
    name: "Battery State of Charge"
    type: STATE_OF_CHARGE
    filters:
      - throttle: 5s
  - platform: victron_ble
    victron_ble_id: smartshunt
    name: "Battery Consumed Ah"
    type: CONSUMED_AH
    filters:
      - throttle: 5s
  - platform: victron_ble
    victron_ble_id: smartshunt
    name: "Battery Time Remaining"
    type: TIME_TO_GO
    filters:
      - throttle: 5s
  - platform: dallas_temp
    # Replace with your own sensor's address — it is printed in the
    # ESPHome logs on boot when a DS18B20 is connected to GPIO14.
    address: 0x1c0000031edd2a28
    name: "ds18b20-1"

logger:

api:

ota:
  - platform: esphome
    id: my_ota
    password: !secret ota_password

mqtt:
  broker: !secret mqtt_broker_ip
  username: !secret mqtt_broker_username
  password: !secret mqtt_broker_password
  client_id: kc868-a8
  reboot_timeout: 0s
  on_message:
    - topic: kc868-a8/irrigation/start
      then:
        - script.execute: irrigation_sequence
    - topic: kc868-a8/irrigation/stop
      then:
        - script.execute: abort_irrigation
